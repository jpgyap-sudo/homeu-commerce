# HomeU Commerce Reference Nginx Config
# This is a reference file. The actual config is deployed on the VPS
# at /etc/nginx/conf.d/homeu.conf
#
# Security features:
# - TLS 1.2/1.3 only
# - Strong ciphers
# - Security headers (HSTS, X-Frame-Options, etc.)
# - Blocked access to dotfiles, node_modules, .env
# - Rate limiting via DaVinciOS CMS config
# - admin.homeu.ph root → /admin redirect

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name store.homeu.ph admin.homeu.ph;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend: store.homeu.ph
server {
    listen 443 ssl http2;
    server_name store.homeu.ph;

    ssl_certificate /etc/letsencrypt/live/store.homeu.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/store.homeu.ph/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Block access to sensitive files
    location ~ /\. { deny all; }
    location ~ \.env { deny all; }
    location ~ /(node_modules|.next) { deny all; }
}

# Backend Admin: admin.homeu.ph
server {
    listen 443 ssl http2;
    server_name admin.homeu.ph;

    ssl_certificate /etc/letsencrypt/live/store.homeu.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/store.homeu.ph/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Redirect root → /admin (admin login)
    location = / {
        return 301 https://$host/admin;
    }

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Block access to sensitive files
    location ~ /\. { deny all; }
    location ~ \.env { deny all; }
    location ~ /(node_modules|.next) { deny all; }
}
