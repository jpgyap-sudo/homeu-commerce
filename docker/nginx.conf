upstream website {
    server website:3000;
}

# Certbot webroot
server {
    listen 80;
    server_name store.homeu.ph admin.homeu.ph;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend: store.homeu.ph
server {
    listen 443 ssl http2;
    server_name store.homeu.ph;

    ssl_certificate /etc/letsencrypt/live/store.homeu.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/store.homeu.ph/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://website;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend Admin: admin.homeu.ph
server {
    listen 443 ssl http2;
    server_name admin.homeu.ph;

    ssl_certificate /etc/letsencrypt/live/admin.homeu.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.homeu.ph/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 50M;

    location / {
        proxy_pass http://website;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
