services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homeu
      POSTGRES_PASSWORD: homeu
      POSTGRES_DB: homeu_campaigns
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

  api:
    build: ./backend
    env_file: .env
    ports:
      - "4100:4100"
    depends_on:
      - postgres
      - redis
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: npm run worker
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "5174:5174"
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
