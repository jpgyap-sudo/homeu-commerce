services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: homeu
      POSTGRES_PASSWORD: homeu_local_password
      POSTGRES_DB: homeu
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homeu_network

  website:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - homeu_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/html
      - certbot_data:/etc/letsencrypt
    depends_on:
      - website
    networks:
      - homeu_network

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    entrypoint: /bin/sh
    volumes:
      - certbot_www:/var/www/html
      - certbot_data:/etc/letsencrypt
    profiles:
      - ssl-setup
    command: >
      -c "certonly --webroot --webroot-path=/var/www/html
      -d store.homeu.ph -d admin.homeu.ph
      --email admin@homeu.ph --agree-tos --non-interactive
      || echo 'Certbot done or skipped'"

networks:
  homeu_network:
    driver: bridge

volumes:
  postgres_data:
  certbot_www:
  certbot_data:
