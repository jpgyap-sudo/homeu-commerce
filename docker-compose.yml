services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: homeu
      POSTGRES_PASSWORD: homeu_local_password
      POSTGRES_DB: homeu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homeu_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeu -d homeu"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - homeu_network

  website:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SITE_URL=https://store.homeatelier.ph
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URI=postgres://homeu:homeu_local_password@postgres:5432/homeu
      - NEXT_PUBLIC_SITE_URL=https://store.homeatelier.ph
      - ADMIN_PUBLIC_SERVER_URL=https://admin.homeatelier.ph
      - OLLAMA_BASE_URL=http://ollama:11434
      - AI_PROVIDER=ollama
      - OLLAMA_MODEL=qwen3:4b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - homeu_network

networks:
  homeu_network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
