services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: homeu
      POSTGRES_PASSWORD: homeu_local_password
      POSTGRES_DB: homeu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homeu_network

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - homeu_network

  website:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres
      - ollama
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - AI_PROVIDER=ollama
      - OLLAMA_MODEL=qwen3:4b
    networks:
      - homeu_network

networks:
  homeu_network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
