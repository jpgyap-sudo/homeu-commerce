services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: homeu
      POSTGRES_PASSWORD: homeu_local_password
      POSTGRES_DB: homeu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homeu_network

  website:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - homeu_network

networks:
  homeu_network:
    driver: bridge

volumes:
  postgres_data:
