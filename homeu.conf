# HomeU Commerce Nginx Config
#
# Security features:
# - TLS 1.2/1.3 only
# - Strong ciphers
# - Security headers (HSTS, X-Frame-Options, etc.)
# - Blocked access to dotfiles, node_modules, .env
#
# 2026-06-22: Added store.homeatelier.ph / admin.homeatelier.ph server
# blocks - those certs already existed in /etc/letsencrypt/live but had
# no matching server_name, so nginx fell back to the store.homeu.ph
# cert (wrong SANs) for any request to *.homeatelier.ph, breaking TLS
# and the theme-preview iframe's frame-ancestors allowlist. Also
# removed the blanket Cache-Control: public, s-maxage=... on
# location / for the frontend - it was overriding Next.js's
# force-dynamic pages (e.g. the homepage reviews section), making admin
# changes invisible to visitors for up to ~6 minutes after every edit.
# Removed the equivalent override on the admin backend for the same
# reason (admin pages must never be cached).

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name store.homeu.ph admin.homeu.ph store.homeatelier.ph admin.homeatelier.ph;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend: store.homeu.ph
server {
    listen 443 ssl http2;
    server_name store.homeu.ph;

    ssl_certificate /etc/letsencrypt/live/store.homeu.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/store.homeu.ph/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://admin.homeatelier.ph https://admin.homeu.ph;" always;

    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff2?|ttf|eot|css|js)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # No Cache-Control override here -- let Next.js's own per-route
        # headers (force-dynamic = no-store) pass through unmodified.
    }

    location ~ /\. { deny all; }
    location ~ \.env { deny all; }
    location ~ /(node_modules|.next) { deny all; }
}

